<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Page</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="container mt-5">
        <h1 class="mb-5 text-center">Зразки розроблених мною 3D-моделей</h1>

        <!-- Інтерактивний перемикач, Triple -->
        <div class="border rounded p-4 shadow-sm mb-5">
            <div class="row align-items-center justify-content-center">
                <div class="col-12 col-md-6 text-center mb-3 mb-md-0">
                    <button class="btn p-0 border-0 custom-image-btn" id="model3-btn">
                        <img src="img/triple_switch_off.png" alt="Switch Off" class="img-fluid switch-off d-none">
                        <img src="img/triple_switch_on.png" alt="Switch On" class="img-fluid switch-on ">
                    </button>

                    <p class="mt-2 mb-0 fw-bold text-secondary">Інтерактивний перемикач</p>
                </div>
                
                <div class="col-12 col-md-6 text-center">
                    <img src="img/triple_switch_3d_model.png" alt="3D Model 1" class="img-fluid rounded shadow-sm">

                    <p class="mt-2 mb-0 fw-bold text-secondary">3D-модель інтерактивного перемикача</p>
                </div>
            </div>
        </div>

        <!-- Інтерактивний перемикач, Single -->
        <div class="border rounded p-4 shadow-sm mb-5">
            <div class="row align-items-center justify-content-center">
                <div class="col-12 col-md-6 text-center mb-3 mb-md-0">
                    <button class="btn p-0 border-0 custom-image-btn" id="model1-btn">
                        <img src="img/single_switch_off.png" alt="Switch Off" class="img-fluid switch-off d-none">
                        <img src="img/single_switch_on.png" alt="Switch On" class="img-fluid switch-on ">
                    </button>

                    <p class="mt-2 mb-0 fw-bold text-secondary">Інтерактивний перемикач</p>
                </div>
                
                <div class="col-12 col-md-6 text-center">
                    <img src="img/single_switch_3d_model.png" alt="3D Model 1" class="img-fluid rounded shadow-sm">

                    <p class="mt-2 mb-0 fw-bold text-secondary">3D-модель інтерактивного перемикача</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
